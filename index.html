<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    />
    <style>
      /* 1. 기본 스타일 및 변수 (플러터 테마 반영) */
      :root {
        --primary-blue: #007aff;
        --apple-black: #1d1d1f;
        --apple-gray: #86868b;
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(255, 255, 255, 0.6);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }
      body {
        background-color: #cacaca;
        height: 100vh;
        overflow: hidden;
        color: var(--apple-black);
      }

      /* 2. Aurora Background (main.dart의 _BlurBlob 재현) */
      .background-container {
        position: fixed;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: #f5f5f7;
      }
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        animation: move 12s infinite alternate ease-in-out;
      }
      .blob-blue {
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(0, 122, 255, 0.3) 0%,
          transparent 70%
        );
        top: -150px;
        left: -150px;
      }
      .blob-purple {
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(88, 86, 214, 0.3) 0%,
          transparent 70%
        );
        bottom: -100px;
        right: -50px;
        animation-delay: -2s;
      }
      .blob-pink {
        width: 450px;
        height: 450px;
        background: radial-gradient(
          circle,
          rgba(255, 45, 85, 0.2) 0%,
          transparent 70%
        );
        top: 30%;
        right: 15%;
        animation-delay: -4s;
      }
      @keyframes move {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(60px, 40px);
        }
      }

      /* 3. 메인 레이아웃 (Sidebar + Content) */
      .main-layout {
        display: flex;
        padding: 25px;
        height: 100vh;
        gap: 25px;
        max-width: 1600px;
        margin: 0 auto;
      }

      .sidebar {
        width: 280px;
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 35px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 50px 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }

      .profile-section {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .profile-avatar {
        width: 150px;
        height: 150px;
        background: linear-gradient(135deg, #00c6ff, #0072ff);
        border-radius: 50%;
        padding: 3px;
        margin-bottom: 20px;
      }
      .avatar-inner {
        width: 100%;
        height: 100%;
        background: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 45px;
      }

      .avatar-inner img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
      }

      .menu-list {
        width: 100%;
        margin-top: 30px;
        flex-grow: 1;
      }
      .menu-item {
        display: flex;
        align-items: center;
        padding: 16px;
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        margin-bottom: 10px;
        color: #444;
      }
      .menu-item.active {
        background: #1d1d1f;
        color: white;
        transform: scale(1.02);
      }
      .menu-item:not(.active):hover {
        background: rgba(255, 255, 255, 0.5);
      }
      .menu-text {
        margin-left: 15px;
        display: flex;
        flex-direction: column;
      }
      .menu-text .title {
        font-size: 15px;
        font-weight: 700;
      }
      .menu-text .sub {
        font-size: 11px;
        opacity: 0.6;
      }

      .content-area {
        flex: 1;
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(15px);
        border-radius: 35px;
        overflow-y: auto;
        border: 1px solid var(--glass-border);
        scrollbar-width: none; /* Firefox */
      }
      .content-area::-webkit-scrollbar {
        display: none;
      } /* Chrome/Safari */

      /* 4. Profile Page 전용 정밀 스타일 (플러터 수치 기반) */
      .profile-page-wrapper {
        padding: 40px 50px;
      }

      /* Hero Section (Stack 재현) */
      .hero-container {
        margin-bottom: 60px;
        position: relative;
      }
      .portfolio-label {
        color: var(--primary-blue);
        font-weight: 800;
        font-size: 14px;
        letter-spacing: 1.5px;
        display: block;
        margin-bottom: 12px;
      }
      .title-stack {
        position: relative;
        height: 130px;
      }
      .hero-title {
        font-size: 52px;
        font-weight: 800;
        line-height: 1.15;
        letter-spacing: -1.8px;
        position: absolute;
      }
      .hero-title.shadow {
        color: rgba(0, 0, 0, 0.05);
        transform: translateY(4px);
      } /* Offset(0, 4) */
      .hero-title.main {
        color: var(--apple-black);
      }
      .hero-subtitle {
        font-size: 19px;
        color: var(--apple-gray);
        margin-top: 20px;
        line-height: 1.6;
        font-weight: 500;
      }

      /* Bento Grid System */
      .flex-row {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
      }
      .flex-1 {
        flex: 1;
      }
      .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(25px);
        border-radius: 30px;
        border: 1px solid var(--glass-border);
        padding: 32px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.04);
        transition: transform 0.3s ease;
      }
      .glass-card:hover {
        transform: translateY(-5px);
      }

      /* Card Header (SectionHeader 재현) */
      .header {
        display: flex;
        align-items: center;
        margin-bottom: 25px;
      }
      .icon-circle {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 12px;
        font-size: 16px;
      }
      .header span {
        font-weight: 700;
        font-size: 16px;
      }

      /* Info Items */
      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .info-item {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .info-item .icon {
        font-size: 20px;
        color: var(--apple-gray);
      }
      .info-item .label {
        font-size: 11px;
        color: var(--apple-gray);
        display: block;
      }
      .info-item .value {
        font-size: 14px;
        font-weight: 700;
      }

      /* Timeline (Education) */
      .timeline-item {
        display: flex;
        gap: 15px;
        margin-bottom: 12px;
      }
      .t-line {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .dot {
        width: 8px;
        height: 8px;
        background: var(--primary-blue);
        border-radius: 50%;
      }
      .line {
        width: 1px;
        flex: 1;
        background: #e5e5e7;
        margin: 4px 0;
      }
      .t-content .date {
        font-size: 12px;
        color: var(--primary-blue);
        font-weight: 700;
      }
      .t-content h4 {
        font-size: 15px;
        font-weight: 700;
        margin: 2px 0;
      }
      .t-content p {
        font-size: 13px;
        color: var(--apple-gray);
      }

      /* GitHub & Certification */
      .dark-card {
        background: #1c1c1e;
        color: white;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .dark-card h3 {
        font-size: 24px;
        font-weight: 800;
      }
      .chip-container {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .chip {
        padding: 8px 14px;
        background: rgba(0, 122, 255, 0.08);
        border-radius: 10px;
        color: var(--primary-blue);
        font-size: 13px;
        font-weight: 600;
        border: 1px solid rgba(0, 122, 255, 0.2);
      }

      /* Tech Skills (TechGroup 재현) */
      .skills-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 40px;
        margin-top: 20px;
      }
      .skill-group h4 {
        font-size: 16px;
        font-weight: 800;
        color: var(--apple-gray);
        margin-bottom: 15px;
      }
      .skill-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        font-size: 15px;
        font-weight: 500;
      }
      .check-icon {
        color: var(--primary-blue);
        font-size: 14px;
        font-weight: 900;
      }

      /* 애니메이션 (SpringFadeIn 재현) */
      @keyframes springUp {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate {
        opacity: 0;
        animation: springUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
    </style>
  </head>
