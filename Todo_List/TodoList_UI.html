<!doctype html>
<html lang="en">

  <body>
    <div class="App">
      <div class="Header">
        <h3>오늘의 Plan</h3>

        <div class="Editor">
          <input type="text" placeholder="새로운 todo" />

      <div class="List">
        <h4>Todo List</h4>

        <div class="todos_wrapper">
          <div class="TodoItem">
            <input type="checkbox" />

            <div class="date"></div>
            <button name="delete" onclick="">삭제</button>
          </div>
          <div class="TodoItem">

          </div>

      </div>
    </div>
    <script src="./js/TodoList.js"></script>
  </body>
</html>
